<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e0c4f" />
      <stop offset="60%" stop-color="#0c0728" />
      <stop offset="100%" stop-color="#050212" />
    </radialGradient>

    <!-- Ticket Gradient -->
    <linearGradient id="ticketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Blitz Lightning Gradient -->
    <linearGradient id="blitzGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#fef08a" />
      <stop offset="70%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="superGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Icon Container (Squircle) -->
  <rect x="12" y="12" width="488" height="488" rx="112" fill="url(#bgGrad)" stroke="#3b0764" stroke-width="4" />

  <!-- Ambient Outer Glow Ring -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-dasharray="14 18" opacity="0.35" />

  <!-- Sparkle Stars -->
  <g fill="url(#goldGrad)">
    <path d="M 115 115 L 118 124 L 127 127 L 118 130 L 115 139 L 112 130 L 103 127 L 112 124 Z" opacity="0.85" />
    <path d="M 405 125 L 407 131 L 413 133 L 407 135 L 405 141 L 403 135 L 397 133 L 403 131 Z" opacity="0.9" />
    <path d="M 125 385 L 127 390 L 132 392 L 127 394 L 125 399 L 123 394 L 118 392 L 123 390 Z" opacity="0.75" />
    <path d="M 390 375 L 393 383 L 401 386 L 393 389 L 390 397 L 387 389 L 379 386 L 387 383 Z" opacity="0.85" />
  </g>

  <!-- Ticket Outer Badge -->
  <g transform="rotate(-10, 256, 230)" filter="url(#superGlow)">
    <!-- Main Gradient Ticket Background -->
    <path d="M 125 150 
             A 22 22 0 0 0 125 194 
             L 125 270 
             A 22 22 0 0 0 125 314 
             L 387 314 
             A 22 22 0 0 0 387 270 
             L 387 194 
             A 22 22 0 0 0 387 150 
             Z" 
          fill="url(#ticketGrad)" 
          stroke="#ffffff" 
          stroke-width="4" 
          stroke-opacity="0.4" />

    <!-- Dashed Perforation Line -->
    <line x1="310" y1="154" x2="310" y2="310" stroke="#ffffff" stroke-dasharray="8 8" stroke-width="3" opacity="0.6" />

    <!-- Cutout Side Notches -->
    <circle cx="125" cy="172" r="20" fill="#0c0728" />
    <circle cx="125" cy="292" r="20" fill="#0c0728" />
    <circle cx="387" cy="172" r="20" fill="#0c0728" />
    <circle cx="387" cy="292" r="20" fill="#0c0728" />

    <!-- Ticket Corner Stars/Dots -->
    <circle cx="170" cy="150" r="3.5" fill="#ffffff" opacity="0.8" />
    <circle cx="210" cy="150" r="3.5" fill="#ffffff" opacity="0.8" />
    <circle cx="250" cy="150" r="3.5" fill="#ffffff" opacity="0.8" />
    <circle cx="348" cy="150" r="3.5" fill="#ffffff" opacity="0.8" />

    <circle cx="170" cy="314" r="3.5" fill="#ffffff" opacity="0.8" />
    <circle cx="210" cy="314" r="3.5" fill="#ffffff" opacity="0.8" />
    <circle cx="250" cy="314" r="3.5" fill="#ffffff" opacity="0.8" />
    <circle cx="348" cy="314" r="3.5" fill="#ffffff" opacity="0.8" />
  </g>

  <!-- High-Energy Blitz Lightning Emblem -->
  <path d="M 275 85 
           L 175 255 
           L 252 255 
           L 215 410 
           L 345 220 
           L 268 220 
           Z" 
        fill="url(#blitzGrad)" 
        stroke="#ffffff" 
        stroke-width="3.5" 
        filter="url(#superGlow)" />

  <!-- Inner Lightning Highlight -->
  <polygon points="268,105 190,245 245,245 224,375 325,215 260,215" fill="#ffffff" opacity="0.5" />

  <!-- Brand Typography -->
  <text x="256" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="3">
    PROMO<tspan fill="#ec4899">BLITZ</tspan>
  </text>
</svg>
